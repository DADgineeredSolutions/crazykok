version: 1
metadata:
  name: CrazyKok operator database administration

entries:
  - model: authentik_core.group
    id: crazykok-operators
    identifiers:
      name: CrazyKok Operators

  - model: authentik_providers_proxy.proxyprovider
    id: crazykok-db-provider
    identifiers:
      name: CrazyKok Database Admin Gateway
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      internal_host: http://db:8080
      external_host: !Env [AUTHENTIK_DB_PUBLIC_URL, https://db.crazykok.local]
      mode: forward_single

  - model: authentik_core.application
    id: crazykok-db-application
    identifiers:
      slug: crazykok-database-admin
    attrs:
      name: Database Administrator
      provider: !KeyOf crazykok-db-provider
      launch_url: !Env [AUTHENTIK_DB_PUBLIC_URL, https://db.crazykok.local]
      description: Operator-only SQLite database administration
      publisher: CrazyKok

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf crazykok-db-application
      group: !KeyOf crazykok-operators
      order: 0
    attrs:
      target: !KeyOf crazykok-db-application
      group: !KeyOf crazykok-operators
      order: 0
      enabled: true

  - model: authentik_outposts.outpost
    identifiers:
      name: authentik Embedded Outpost
    attrs:
      providers:
        - !Find [authentik_providers_proxy.proxyprovider, [name, CrazyKok Local Gateway]]
        - !KeyOf crazykok-db-provider
