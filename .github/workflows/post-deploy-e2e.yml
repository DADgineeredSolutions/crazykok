name: Post-deployment E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed CrazyKok application URL
        required: true
        default: https://crazykok.com
        type: string
  workflow_call:
    inputs:
      base_url:
        description: Deployed CrazyKok application URL
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: Deployed UI smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    env:
      E2E_BASE_URL: ${{ inputs.base_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run read-only deployed UI journeys
        run: npm run test:e2e:deployed

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: post-deploy-playwright-report
          path: frontend/playwright-report
          retention-days: 7
