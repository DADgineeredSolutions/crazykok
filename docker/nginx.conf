map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name ${APP_DOMAIN} ${APP_DOMAIN_ALIAS} ${PUBLIC_SITE_DOMAIN} ${API_DOMAIN} ${DOCS_DOMAIN} ${API_DOCS_DOMAIN} ${DB_DOMAIN} ${AUTH_DOMAIN} ${IDP_STUB_DOMAIN};
  return 308 https://$host$request_uri;
}

server {
  listen 80 default_server;
  server_name _;
  return 421;
}

server {
  listen 443 ssl;
  server_name ${PUBLIC_SITE_DOMAIN};

  ssl_certificate /etc/nginx/certs/localhost.crt;
  ssl_certificate_key /etc/nginx/certs/localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:TLS:10m;
  ssl_session_timeout 1d;

  resolver 127.0.0.11 valid=10s ipv6=off;

  location / {
    set $public_site_upstream http://crazykok-public-web:8080;
    proxy_pass $public_site_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  server_name ${APP_DOMAIN_ALIAS};

  ssl_certificate /etc/nginx/certs/localhost.crt;
  ssl_certificate_key /etc/nginx/certs/localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  return 308 https://${APP_DOMAIN}$request_uri;
}

server {
  listen 443 ssl;
  server_name ${APP_DOMAIN};

  ssl_certificate /etc/nginx/certs/localhost.crt;
  ssl_certificate_key /etc/nginx/certs/localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:TLS:10m;
  ssl_session_timeout 1d;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /crazykok-logo.png {
    access_log off;
    root /usr/share/nginx/html;
  }

  location = /logout {
    return 302 ${FULL_LOGOUT_URL};
  }

  location /outpost.goauthentik.io/ {
    proxy_pass http://auth-server:9000/outpost.goauthentik.io/;
    proxy_set_header Host $host;
    proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location @goauthentik_proxy_signin {
    internal;
    add_header Set-Cookie $auth_cookie;
    return 302 /outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri;
  }

  location / {
    include /etc/nginx/auth/${AUTH_GATEWAY_MODE}.conf;
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    include /etc/nginx/auth/${AUTH_GATEWAY_MODE}.conf;
    proxy_pass http://api:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /api;
  }

  location ^~ /api/internal/ {
    return 404;
  }

  location = /docs.html {
    return 404;
  }
}

server {
  listen 443 ssl;
  server_name ${API_DOMAIN};

  ssl_certificate /etc/nginx/certs/localhost.crt;
  ssl_certificate_key /etc/nginx/certs/localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:TLS:10m;
  ssl_session_timeout 1d;

  location /outpost.goauthentik.io/ {
    proxy_pass http://auth-server:9000/outpost.goauthentik.io/;
    proxy_set_header Host $host;
    proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location @goauthentik_proxy_signin {
    internal;
    add_header Set-Cookie $auth_cookie;
    return 302 /outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri;
  }

  location = /health {
    proxy_pass http://api:8000/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /internal/ {
    return 404;
  }

  location / {
    include /etc/nginx/auth/${AUTH_GATEWAY_MODE}.conf;
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  server_name ${DOCS_DOMAIN};

  ssl_certificate /etc/nginx/certs/localhost.crt;
  ssl_certificate_key /etc/nginx/certs/localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:TLS:10m;
  ssl_session_timeout 1d;

  location ^~ /api/ {
    return 404;
  }

  location ^~ /internal/ {
    return 404;
  }

  location = /api-reference {
    return 302 https://${API_DOCS_DOMAIN}/;
  }

  location ^~ /document/ {
    root /usr/share/nginx/html;
    try_files /docs.html =404;
  }

  location ~* \.(?:md|mmd)$ {
    root /usr/share/nginx/html;
    default_type text/plain;
    add_header Content-Disposition inline;
    try_files $uri =404;
  }

  location / {
    root /usr/share/nginx/html;
    index docs.html;
    try_files $uri $uri/ /docs.html;
  }
}

