server {
  listen 8080;
  server_name _;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /openapi.json {
    proxy_pass http://api:8000/v1/openapi.json;
    proxy_set_header Host ${API_DOMAIN};
    proxy_set_header X-Forwarded-Host ${API_DOMAIN};
    proxy_set_header X-Forwarded-Proto https;
  }

  location = /project-docs {
    return 302 https://${DOCS_DOMAIN}/;
  }

  location /assets/ {
    root /usr/share/nginx/html;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
